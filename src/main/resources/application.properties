spring.application.name=bank-account-api
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:-localhost}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-bankaccount}
spring.datasource.username=${POSTGRES_USER:-bankuser}
spring.datasource.password=${POSTGRES_PASSWORD:-bankpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis
spring.data.redis.host=${REDIS_HOST:-localhost}
spring.data.redis.port=${REDIS_PORT:-6379}

# Actuator expose health, info, metrics, and circuit breaker events
management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers,circuitbreakerevents
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

spring.mvc.problemdetails.enabled=true

# OpenAPI / Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Resilience4j "database" circuit breaker
resilience4j.circuitbreaker.instances.database.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.database.sliding-window-size=10
resilience4j.circuitbreaker.instances.database.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.database.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.database.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.database.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.database.register-health-indicator=true
resilience4j.circuitbreaker.instances.database.record-exceptions=\
  org.springframework.dao.DataAccessException,\
  com.bank.account.domain.exception.DatabaseUnavailableException
